      - name: 2. Check Tauri config for risky settings
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $configCandidates = @(
            "./src-tauri/tauri.conf.json",
            "./src-tauri/tauri.conf.json5",
            "./src-tauri/Tauri.toml"
          )

          $foundConfigs = $configCandidates | Where-Object { Test-Path $_ }

          if ($foundConfigs.Count -eq 0) {
            Write-Host "No Tauri config found. Skipping."
            exit 0
          }

          New-Item -ItemType Directory -Force -Path "./security-reports" | Out-Null

          $criticalPatterns = @(
            "dangerousRemoteDomainIpcAccess",
            "unsafe-eval",
            "unsafe-inline",
            '"all"\s*:\s*true',
            'allowAll',
            'fs.*all.*true',
            'shell.*all.*true',
            'http://(?!localhost|127\.0\.0\.1)'
          )

          $reviewPatterns = @(
            "devUrl",
            "localhost",
            "127.0.0.1",
            "shell",
            "open",
            "fs",
            "http://localhost",
            "http://127.0.0.1",
            "https://"
          )

          $criticalFindings = @()
          $reviewFindings = @()

          foreach ($config in $foundConfigs) {
            foreach ($pattern in $criticalPatterns) {
              $matches = Select-String -Path $config -Pattern $pattern -CaseSensitive:$false -ErrorAction SilentlyContinue
              if ($matches) {
                $criticalFindings += $matches
              }
            }

            foreach ($pattern in $reviewPatterns) {
              $matches = Select-String -Path $config -Pattern $pattern -CaseSensitive:$false -ErrorAction SilentlyContinue
              if ($matches) {
                $reviewFindings += $matches
              }
            }
          }

          $criticalFindings | Out-File "./security-reports/tauri-config-critical-findings.txt" -Encoding utf8
          $reviewFindings | Out-File "./security-reports/tauri-config-review-findings.txt" -Encoding utf8

          if ($reviewFindings.Count -gt 0) {
            Write-Warning "Review-level Tauri config patterns were found. Check tauri-config-review-findings.txt."
          }

          if ($criticalFindings.Count -gt 0) {
            Write-Error "Critical Tauri config risk patterns found. Review tauri-config-critical-findings.txt."
            exit 1
          }

          Write-Host "No critical Tauri config risk patterns found."